<!doctype html>
<html>
<head>
  <title>SkyScribble 3D Viewer</title>
  <style>
    body { margin: 0; font-family: Arial; background: #000; color: #fff; overflow: hidden; }
    #viewer { width: 100vw; height: 100vh; }
    #toolbar { position: absolute; top: 20px; left: 20px; z-index: 100; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; }
    button { background: #3f8bff; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin: 4px; }
    #modelList { max-height: 200px; overflow: auto; margin-top: 10px; }
    #modelList div { padding: 6px; cursor: pointer; border-bottom: 1px solid #333; }
    #modelList div:hover { background: rgba(63,139,255,0.3); }
    .info { position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 12px; border-radius: 8px; font-size: 14px; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/MTLLoader.js"></script>
</head>
<body>
  <div id="toolbar">
    <h3>3D Models</h3>
    <div id="modelList"></div>
    <button onclick="loadLatest()">Load Latest</button>
    <button onclick="resetView()">Reset View</button>
  </div>
  <div class="info">
    Mouse: Orbit | Wheel: Zoom | Right-click drag: Pan
  </div>
  <div id="viewer"></div>

  <script>
    let scene, camera, renderer, model, currentObj, currentMtl;
    const models = [];

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0a1420);

      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 5;

      const light1 = new THREE.DirectionalLight(0xffffff, 1);
      light1.position.set(1, 1, 1);
      scene.add(light1);
      
      const light2 = new THREE.DirectionalLight(0x88ccff, 0.6);
      light2.position.set(-1, 0, 1);
      scene.add(light2);

      const ambient = new THREE.AmbientLight(0x404040, 0.4);
      scene.add(ambient);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.getElementById('viewer').appendChild(renderer.domElement);

      const controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;

      loadModels();
      animate();
    }

    function loadModels() {
      fetch('/outputs/3d-model/')
        .then(r => r.text())
        .then(text => {
          const list = document.getElementById('modelList');
          list.innerHTML = '';
          const files = text.split('\n').filter(line => line.includes('.obj'));
          models.length = 0;
          files.forEach(file => {
            if (file.includes('.obj')) {
              const name = file.split('/').pop();
              const div = document.createElement('div');
              div.textContent = name;
              div.onclick = () => loadModel(file);
              list.appendChild(div);
              models.push(file);
            }
          });
        });
    }

    function loadLatest() {
      if (models.length) loadModel(models[models.length - 1]);
    }

    function loadModel(objPath) {
      if (currentObj) scene.remove(currentObj);

      const loader = new THREE.MTLLoader();
      const baseUrl = objPath.substring(0, objPath.lastIndexOf('/') + 1);
      loader.setPath(baseUrl);
      
      loader.load(objPath.replace('.obj', '.mtl'), (materials) => {
        materials.preload();
        const objLoader = new THREE.OBJLoader();
        objLoader.setMaterials(materials);
        objLoader.load(objPath, (obj) => {
          currentObj = obj;
          scene.add(obj);
          const box = new THREE.Box3().setFromObject(obj);
          const center = box.getCenter(new THREE.Vector3());
          obj.position.sub(center);
          camera.position.set(0, 0, 5);
          camera.lookAt(0, 0, 0);
        });
      });
    }

    function resetView() {
      camera.position.set(0, 0, 5);
      camera.lookAt(0, 0, 0);
    }

    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();
  </script>
</body>
</html>
