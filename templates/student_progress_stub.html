{% extends "student_base.html" %}
{% block title %}Progress · SkyScribble{% endblock %}
{% block content %}
<link rel="stylesheet" href="/assets/student_dashboard.css">
<div class="main-panel animate-fadein" style="max-width:800px;margin:0 auto;">
  <div class="dash-header">
    <h1><i class="fas fa-chart-line"></i> Progress Overview</h1>
    <a class="studio-btn" href="/student"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
  </div>
  <div class="dash-section" style="min-height:400px;">
    <p style="color:#6c7a92;font-size:1rem;text-align:center;padding:60px 20px;">
      <i class="fas fa-chart-line" style="font-size:4rem;color:#67e0b2;margin-bottom:20px;display:block;"></i>
      Full Progress charts coming soon.
    </p>
    <p style="color:#a8c8ff;font-size:0.95rem;text-align:center;">
      Track subjects and stats from the <a class="link" href="/student">Dashboard</a>.
    </p>
  </div>
</div>
{% endblock %}
