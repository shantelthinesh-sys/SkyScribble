<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}SkyScribble Teacher{% endblock %}</title>
  <link rel="stylesheet" href="/assets/dashboard.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: #000;
      color: #AABBCF;
      font-family: 'Inter', 'Segoe UI', 'Poppins', Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      letter-spacing: 0.01em;
    }
    .navbar {
      width: 100vw;
      background: #0B1F3A;
      color: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 32px;
      height: 60px;
      box-shadow: 0 2px 16px 0 #000a;
      z-index: 10;
    }
    .navbar .app-title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin: 0 auto;
      color: #FFFFFF;
    }
    .navbar .profile {
      display: none;
    }
    .layout {
      display: flex;
      flex: 1 1 auto;
      min-height: 0;
      min-width: 0;
      height: calc(100vh - 60px);
    }
    .sidebar {
      background: #0B1F3A;
      width: 220px;
      min-width: 220px;
      max-width: 220px;
      box-shadow: 2px 0 16px 0 #000a;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 32px 0 24px 0;
      z-index: 2;
      border-right: 1.5px solid #112240;
    }
    .sidebar.expanded {
      width: 220px;
      min-width: 220px;
    }
    .sidebar .logo {
      width: 38px;
      margin-bottom: 32px;
      transition: width 0.2s;
    }
    .sidebar.expanded .logo {
      width: 120px;
    }
    .sidebar nav {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .sidebar nav a {
      color: #e6eaf3;
      text-decoration: none;
      font-weight: 600;
      padding: 13px 18px;
      border-radius: 10px;
      font-size: 1.18rem;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: background 0.18s, color 0.18s, box-shadow 0.18s, transform 0.12s;
      position: relative;
    }
    .sidebar nav a.active, .sidebar nav a:hover {
      background: #1E90FF22;
      color: #1E90FF;
      box-shadow: 0 0 8px #1E90FF44;
      transform: scale(1.04);
    }
    .sidebar .toggle {
      margin: 18px 0 0 0;
      color: #1E90FF;
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      transition: color 0.18s;
    }
    .sidebar .toggle:hover {
      color: #fff;
    }
    .sidebar .user {
      margin-top: auto;
      text-align: center;
      color: #6c7a92;
      font-size: 0.98rem;
      margin-bottom: 10px;
      display: none;
    }
    .sidebar.expanded .user {
      display: block;
    }
    @media (max-width: 900px) {
      .sidebar.expanded { width: 100vw; min-width: 100vw; max-width: 100vw; }
      .sidebar { width: 60px; min-width: 60px; }
      .layout { flex-direction: column; }
    }
    .main-content {
      flex: 1 1 auto;
      min-width: 0;
      min-height: 0;
      background: #000;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      overflow-x: hidden;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="app-title">SkyScribble</div>
    <div class="profile">
      <span class="user" id="navbarUser">Welcome, Teacher</span>
      <button class="logout-btn" id="navbarLogoutBtn">Logout</button>
    </div>
  </div>
  <div class="layout">
    <div class="sidebar" id="sidebar">
      <img src="/assets/logo.svg" alt="SkyScribble logo" class="logo" />
      <nav>
        <a href="/dashboard" id="nav-dashboard"><i class="fas fa-home"></i> <span class="nav-label">Dashboard</span></a>
      </nav>
      <button class="toggle" id="sidebarToggle"><i class="fas fa-angle-double-right"></i></button>
      <div class="user" id="sidebarUser">Welcome, Teacher</div>
    </div>
    <div class="main-content" id="mainContent">
      {% block content %}{% endblock %}
    </div>
  </div>
  <script>
    // Sidebar collapse/expand
    const sidebar = document.getElementById('sidebar');
    const sidebarToggle = document.getElementById('sidebarToggle');
    sidebarToggle.addEventListener('click', () => {
      sidebar.classList.toggle('expanded');
      sidebarToggle.querySelector('i').classList.toggle('fa-angle-double-right');
      sidebarToggle.querySelector('i').classList.toggle('fa-angle-double-left');
    });
      
    // Responsive sidebar navigation (event delegation)
    document.querySelector('.sidebar nav').addEventListener('click', function(e) {
      const link = e.target.closest('a');
      if (link && link.href) {
        e.preventDefault();
        window.location.href = link.href;
        if (window.innerWidth < 900) sidebar.classList.remove('expanded');
      }
    });

    // Active nav highlight
    const path = window.location.pathname;
    [
      ['dashboard', '/dashboard'],
      ['classes', '/classes'],
      ['assignments', '/assignments'],
      ['annotation', '/annotation'],
      ['resources', '/resources']
    ].forEach(([id, route]) => {
      const el = document.getElementById('nav-' + id);
      if (el && path.startsWith(route)) el.classList.add('active');
    });

    // Navbar user and logout
    const navbarUser = document.getElementById('navbarUser');
    const navbarLogoutBtn = document.getElementById('navbarLogoutBtn');
    const sidebarUser = document.getElementById('sidebarUser');
    function getSession() {
      try {
        return JSON.parse(localStorage.getItem("skyscribble_session") || "null");
      } catch { return null; }
    }
    const session = getSession();
    if (!session || !session.email) {
      navbarUser.textContent = sidebarUser.textContent = "Please log in. Redirecting...";
      setTimeout(() => { window.location.href = "/login"; }, 900);
    } else {
      navbarUser.textContent = sidebarUser.textContent = `Welcome, ${session.name || session.email}`;
    }
    navbarLogoutBtn.addEventListener("click", () => {
      localStorage.removeItem("skyscribble_session");
      window.location.href = "/login";
    });
  </script>
</body>
</html>
