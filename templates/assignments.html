{% extends "base.html" %}
{% block content %}
<div class="main-panel animate-fadein">
	<div class="dashboard-header animate-slidein">
		<h1>Assignments</h1>
		<div class="teacher-tools">
			<button class="main-btn" onclick="window.location.href='/dashboard'">Back to Dashboard</button>
		</div>
	</div>
	<div class="dashboard-content animate-fadein" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:32px;align-items:stretch;">
		<section class="dashboard-section animate-card" id="assignments">
			<h2>Manage Assignments</h2>
			<ul id="assignmentList"></ul>
			<div class="add-note" style="margin-top:12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
				<input type="text" id="assignmentInput" placeholder="Add new assignment (e.g. Draw a tree)" />
				<input type="date" id="assignmentDue" />
				<button class="main-btn" onclick="addAssignment()">Add</button>
			</div>
		</section>
	</div>
</div>
<script>
function addAssignment() {
	const input = document.getElementById('assignmentInput');
	const due = document.getElementById('assignmentDue');
	const title = input.value.trim();
	const dueDate = due.value;
	if (!title || !dueDate) return;
	let assignments = JSON.parse(localStorage.getItem('teacher_assignments') || '[]');
	assignments.push({ title, due: dueDate });
	localStorage.setItem('teacher_assignments', JSON.stringify(assignments));
	input.value = '';
	due.value = '';
	renderAssignments();
}
function removeAssignment(idx) {
	let assignments = JSON.parse(localStorage.getItem('teacher_assignments') || '[]');
	assignments.splice(idx, 1);
	localStorage.setItem('teacher_assignments', JSON.stringify(assignments));
	renderAssignments();
}
function renderAssignments() {
	const assignmentList = document.getElementById('assignmentList');
	let assignments = JSON.parse(localStorage.getItem('teacher_assignments') || '[]');
	if (assignments.length === 0) {
		assignmentList.innerHTML = "<li style='color:#8fa3be'>No assignments yet. Add one!</li>";
		return;
	}
	assignmentList.innerHTML = assignments.map((a,i) => `<li>${a.title} - <span class='due-date'>Due: ${a.due}</span> <button class='main-btn' style='padding:2px 10px;font-size:0.98em;' onclick='removeAssignment(${i})'>Remove</button></li>`).join('');
}
renderAssignments();
</script>
{% endblock %}
