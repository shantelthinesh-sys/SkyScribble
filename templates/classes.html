{% extends "base.html" %}
{% block content %}
<div class="main-panel animate-fadein">
	<div class="dashboard-header animate-slidein">
		<h1>Classes</h1>
		<div class="teacher-tools">
			<button class="main-btn" onclick="window.location.href='/dashboard'">Back to Dashboard</button>
		</div>
	</div>
	<div class="dashboard-content animate-fadein" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:32px;align-items:stretch;">
		<section class="dashboard-section animate-card" id="quick-stats">
			<h2>Quick Stats</h2>
			<ul>
				<li>Total Classes: <span id="totalClasses">0</span></li>
				<li>Active: <span id="activeClasses">0</span></li>
			</ul>
		</section>
		<section class="dashboard-section animate-card" id="classes">
			<h2>Manage Classes</h2>
			<ul id="classList"></ul>
			<div class="add-note" style="margin-top:12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
				<input type="text" id="classInput" placeholder="Add new class (e.g. Grade 7A)" />
				<button class="main-btn" onclick="addClass()">Add</button>
			</div>
		</section>
	</div>
</div>
<script>
function addClass() {
	const input = document.getElementById('classInput');
	const className = input.value.trim();
	if (!className) return;
	let classes = JSON.parse(localStorage.getItem('teacher_classes') || '[]');
	classes.push({ name: className, status: 'Active' });
	localStorage.setItem('teacher_classes', JSON.stringify(classes));
	input.value = '';
	renderClasses();
	renderStats();
}
function removeClass(idx) {
	let classes = JSON.parse(localStorage.getItem('teacher_classes') || '[]');
	classes.splice(idx, 1);
	localStorage.setItem('teacher_classes', JSON.stringify(classes));
	renderClasses();
	renderStats();
}
function renderClasses() {
	const classList = document.getElementById('classList');
	let classes = JSON.parse(localStorage.getItem('teacher_classes') || '[]');
	if (classes.length === 0) {
		classList.innerHTML = "<li style='color:#8fa3be'>No classes yet. Add one!</li>";
		return;
	}
	classList.innerHTML = classes.map((c,i) => `<li>${c.name} - <span style='color:#7fffa1'>${c.status}</span> <button class='main-btn' style='padding:2px 10px;font-size:0.98em;' onclick='removeClass(${i})'>Remove</button></li>`).join('');
}
function renderStats() {
	let classes = JSON.parse(localStorage.getItem('teacher_classes') || '[]');
	document.getElementById('totalClasses').textContent = classes.length;
	document.getElementById('activeClasses').textContent = classes.filter(c => c.status === 'Active').length;
}
renderClasses();
renderStats();
</script>
{% endblock %}
