{% extends "student_base.html" %}
{% block title %}Gallery · SkyScribble{% endblock %}
{% block content %}
<link rel="stylesheet" href="/assets/student_dashboard.css">
<div class="main-panel animate-fadein" style="max-width:900px;margin:0 auto;">
  <div class="dash-header">
    <h1><i class="fas fa-images"></i> My Gallery</h1>
    <a class="studio-btn" href="/student"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
  </div>
  <div class="dash-section" style="min-height:400px;">
    <p style="color:#6c7a92;font-size:1rem;text-align:center;padding:60px 20px;">
      <i class="fas fa-images" style="font-size:4rem;color:#67e0b2;margin-bottom:20px;display:block;"></i>
      Gallery feature coming soon.
    </p>
    <p style="color:#a8c8ff;font-size:0.95rem;text-align:center;">
      Your saved drawings are in <strong>outputs/</strong> folder. Access via 
      <a class="link" href="/draw">Studio</a> or file explorer.
    </p>
  </div>
</div>
{% endblock %}
