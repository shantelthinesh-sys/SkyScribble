<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}SkyScribble Student{% endblock %}</title>
<link rel="stylesheet" href="/assets/dashboard.css">
  <link rel="stylesheet" href="/assets/student_dashboard.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />
  <style>
    body {
      background: #000;
      color: #AABBCF;
      font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      letter-spacing: 0.01em;
    }
    .navbar {
      width: 100%;
      background: #0a1a2e;
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 32px;
      height: 60px;
      box-shadow: 0 2px 16px #000a;
      z-index: 10;
      box-sizing: border-box;
      border-bottom: 1px solid rgba(103,220,150,0.15);
    }
    .navbar .app-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      margin-right: auto;
    }
    .navbar .role-badge {
      background: rgba(103,224,178,0.15);
      border: 1px solid rgba(103,224,178,0.35);
      color: #67e0b2;
      border-radius: 999px;
      padding: 3px 12px;
      font-size: 0.78rem;
      font-weight: 600;
      margin-right: 14px;
      letter-spacing: 0.06em;
    }
    .navbar .profile { display: flex; align-items: center; gap: 12px; }
    .navbar .user-name { color: #a8c8ff; font-size: 0.9rem; font-weight: 600; }
    .logout-btn {
      background: rgba(103,224,178,0.1);
      border: 1px solid rgba(103,224,178,0.3);
      color: #67e0b2;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.84rem;
      cursor: pointer;
      transition: background 0.18s;
    }
    .logout-btn:hover { background: rgba(103,224,178,0.22); color: #eaf2ff; }
    .layout { display: flex; flex: 1 1 auto; min-height: 0; height: calc(100vh - 60px); }
    .sidebar {
      background: #0a1a2e;
      width: 60px; min-width: 60px; max-width: 60px;
      box-shadow: 2px 0 16px #000a;
      display: flex; flex-direction: column; align-items: flex-start;
      padding: 24px 0;
      z-index: 2;
      border-right: 1.5px solid rgba(103,224,178,0.1);
      transition: width 0.25s, min-width 0.25s, max-width 0.25s;
      overflow: hidden;
    }
    .sidebar.expanded { width: 230px; min-width: 230px; max-width: 230px; }
    .sidebar .logo { width: 40px; margin: 0 10px 28px; transition: width 0.25s, margin 0.25s; flex-shrink: 0; }
    .sidebar.expanded .logo { width: 170px; margin: 0 16px 28px; }
    .sidebar nav { width: 100%; display: flex; flex-direction: column; gap: 4px; }
    .sidebar nav a {
      color: #e6eaf3; text-decoration: none; font-weight: 600;
      padding: 12px 18px; border-radius: 10px; font-size: 0.95rem;
      display: flex; align-items: center; gap: 14px; white-space: nowrap;
      transition: background 0.18s, color 0.18s;
    }
    .sidebar nav a i { width: 18px; text-align: center; flex-shrink: 0; }
    .sidebar nav a .nav-label { opacity: 0; transition: opacity 0.2s; pointer-events: none; }
    .sidebar.expanded nav a .nav-label { opacity: 1; pointer-events: auto; }
    .sidebar nav a.active, .sidebar nav a:hover {
      background: rgba(103,224,178,0.1);
      color: #67e0b2;
      box-shadow: 0 0 8px rgba(103,224,178,0.15);
    }
    .sidebar .toggle {
      margin: 16px 0 0 14px; color: #67e0b2; background: none;
      border: none; font-size: 1.3rem; cursor: pointer; transition: color 0.18s;
    }
    .sidebar .toggle:hover { color: #fff; }
    .sidebar .sidebar-user {
      margin-top: auto; padding: 0 16px 0 18px; color: #6c7a92;
      font-size: 0.88rem; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; opacity: 0; transition: opacity 0.2s;
    }
    .sidebar.expanded .sidebar-user { opacity: 1; }
    @media (max-width: 900px) {
      .sidebar { width: 0; min-width: 0; padding: 0; }
      .sidebar.expanded { width: 100vw; min-width: 100vw; max-width: 100vw; }
    }
    .main-content {
      flex: 1 1 auto; min-width: 0; background: #000;
      display: flex; flex-direction: column; overflow-x: hidden; overflow-y: auto;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="app-title">SkyScribble</div>
    <span class="role-badge">STUDENT</span>
    <div class="profile">
      <span class="user-name" id="navbarUser"></span>
      <button class="logout-btn" id="navbarLogoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
  </div>
  <div class="layout">
    <div class="sidebar" id="sidebar">
      <img src="/assets/logo.svg" alt="SkyScribble logo" class="logo" />
      <nav>
        <a href="/student" id="nav-student"><i class="fas fa-home"></i><span class="nav-label">Home</span></a>
        <a href="/student/assignments" id="nav-sassignments"><i class="fas fa-clipboard-list"></i><span class="nav-label">Assignments</span></a>
        <a href="/student/notes" id="nav-snotes"><i class="fas fa-sticky-note"></i><span class="nav-label">My Notes</span></a>
        <a href="/student/gallery" id="nav-sgallery"><i class="fas fa-images"></i><span class="nav-label">My Gallery</span></a>
        <a href="/student/progress" id="nav-sprogress"><i class="fas fa-chart-line"></i><span class="nav-label">Progress</span></a>
        <a href="/draw" id="nav-sdraw"><i class="fas fa-pen-nib"></i><span class="nav-label">Studio</span></a>
      </nav>
      <button class="toggle" id="sidebarToggle"><i class="fas fa-angle-double-right"></i></button>
      <div class="sidebar-user" id="sidebarUser"></div>
    </div>
    <div class="main-content" id="mainContent">
      {% block content %}{% endblock %}
    </div>
  </div>
  <script>
    const sidebar = document.getElementById('sidebar');
    const sidebarToggle = document.getElementById('sidebarToggle');
    sidebarToggle.addEventListener('click', () => {
      sidebar.classList.toggle('expanded');
      const icon = sidebarToggle.querySelector('i');
      icon.classList.toggle('fa-angle-double-right');
      icon.classList.toggle('fa-angle-double-left');
    });
    const path = window.location.pathname;
    [['student','/student'],['sassignments','/student/assignments'],
     ['snotes','/student/notes'],['sgallery','/student/gallery'],
     ['sprogress','/student/progress'],['sdraw','/draw']
    ].forEach(([id, route]) => {
      const el = document.getElementById('nav-' + id);
      if (el && path === route) el.classList.add('active');
    });
    function getSession() {
      try { return JSON.parse(localStorage.getItem("skyscribble_session") || "null"); } catch { return null; }
    }
    const session = getSession();
    const navbarUser = document.getElementById('navbarUser');
    const sidebarUser = document.getElementById('sidebarUser');
    if (!session || !session.email) {
      setTimeout(() => { window.location.href = "/login"; }, 900);
    } else {
      const name = session.name || session.email;
      navbarUser.textContent = name;
      sidebarUser.textContent = name;
    }
    document.getElementById('navbarLogoutBtn').addEventListener('click', () => {
      localStorage.removeItem("skyscribble_session");
      window.location.href = "/login";
    });
  </script>
</body>
</html>
